<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>لعبة إكمال الفراغات - قصة العمل</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: 'Amiri', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #1a4d3e, #0e3a2d);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            margin: 0;
        }

        .game-box {
            max-width: 500px;
            width: 100%;
            background: #fff7e6;
            border-radius: 30px 30px 15px 15px;
            box-shadow: 0 10px 15px rgba(0,0,0,0.5), 0 0 0 4px #c9a87c;
            overflow: hidden;
        }

        .game-header {
            background: linear-gradient(145deg, #0a5f44, #1e7b5c);
            color: white;
            padding: 15px 10px;
            text-align: center;
            border-bottom: 4px solid #f3b33d;
        }

        .game-header h1 {
            font-size: 1.7rem;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .game-header h1 span {
            font-size: 2rem;
        }

        .game-subtitle {
            background-color: #f3b33d;
            color: #1e3a2f;
            font-size: 1rem;
            padding: 6px 18px;
            border-radius: 40px;
            display: inline-block;
            font-weight: bold;
            box-shadow: 0 3px 0 #b47d2e;
        }

        .visitor-counter {
            background: #2d5a44;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-size: 0.95rem;
            border-bottom: 1px solid #f3b33d;
        }

        .visitor-box {
            background-color: #ffeac2;
            color: #2d3e50;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .progress-bar {
            background: #2d5a44;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            flex-wrap: wrap;
            gap: 8px;
        }

        .score {
            background-color: #ffeac2;
            color: #2d3e50;
            padding: 6px 15px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 3px 0 #b38b5f;
            transition: all 0.3s ease;
        }

        .score.hidden {
            opacity: 0.5;
            background-color: #cccccc;
            box-shadow: 0 3px 0 #999999;
        }

        .score.hidden .star {
            filter: grayscale(100%);
        }

        .score-value-placeholder {
            font-style: italic;
            color: #666;
        }

        .correct-count {
            background-color: #f3b33d;
            padding: 6px 15px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            color: #1e3a2f;
        }

        .story-area {
            background: #f0e0ca;
            padding: 15px;
            max-height: 55vh;
            overflow-y: auto;
        }

        .story-card {
            background: white;
            border-radius: 25px;
            padding: 15px;
            box-shadow: 0 5px 0 #8b6e4b;
            border: 2px solid #b38b60;
        }

        .story-title {
            text-align: center;
            font-size: 1.1rem;
            color: #4a2e1b;
            margin-bottom: 12px;
            background: #f3b33d;
            padding: 6px;
            border-radius: 30px;
            border: 1px solid #8b6e4b;
        }

        .full-story {
            font-size: 1.1rem;
            line-height: 2.2;
            text-align: justify;
            color: #2d3e50;
            padding: 10px;
            background: #fef9e6;
            border-radius: 20px;
            border: 1px solid #d4a373;
        }

        .blank-space {
            display: inline-block;
            min-width: 75px;
            max-width: 130px;
            padding: 5px 8px;
            background: #fff3cd;
            border: 2px dashed #f3b33d;
            border-radius: 25px;
            font-size: 1rem;
            text-align: center;
            margin: 2px 3px;
            color: #856404;
            font-weight: bold;
            transition: all 0.2s;
            cursor: pointer;
        }

        .blank-space.filled {
            background: #2ecc71;
            border: 2px solid #27ae60;
            color: white;
        }

        .blank-space.correct {
            background: #2ecc71;
            border-color: #27ae60;
            color: white;
        }

        .blank-space.wrong {
            background: #e74c3c;
            border-color: #c0392b;
            color: white;
        }

        .blank-space.show-correct {
            background: #e74c3c;
            border-color: #c0392b;
            color: white;
            position: relative;
        }

        .blank-space.show-correct::after {
            content: "✓";
            position: absolute;
            top: -8px;
            right: -8px;
            background: #27ae60;
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
        }

        .words-area {
            background: #8b6e4b;
            padding: 15px 10px;
            border-radius: 25px;
            margin-top: 12px;
            border: 2px solid #d4a373;
        }

        .words-title {
            color: white;
            font-size: 1rem;
            text-align: center;
            margin-bottom: 10px;
        }

        .words-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            min-height: 120px;
        }

        .word-item {
            background: #f3b33d;
            color: #1e3a2f;
            padding: 8px 12px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            box-shadow: 0 3px 0 #b47d2e;
            border: 1px solid #ffe39c;
            display: inline-block;
            min-width: 70px;
            text-align: center;
            transition: all 0.2s;
            cursor: pointer;
        }

        .word-item:active {
            transform: scale(0.95);
            background: #e9a82e;
        }

        .word-item.selected {
            background: #3498db;
            color: white;
            transform: scale(1.05);
            box-shadow: 0 4px 0 #2980b9;
        }

        .word-item.used {
            background: #95a5a6;
            color: white;
            pointer-events: none;
            opacity: 0.5;
            box-shadow: 0 1px 0 #7f8c8d;
            transform: translateY(2px);
        }

        .guide-message {
            background: #3498db;
            color: white;
            padding: 10px;
            border-radius: 25px;
            font-size: 1rem;
            text-align: center;
            margin: 12px 0 5px;
            border: 1px solid #2980b9;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 15px;
            background: #f0e0ca;
        }

        .action-btn {
            background-color: #f3b33d;
            color: #1e3a2f;
            border: none;
            padding: 5px 10px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 4px 0 #b47d2e;
            border: 2px solid #ffe39c;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        .action-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #b47d2e;
        }

        .action-btn.check {
            background-color: #2ecc71;
            box-shadow: 0 4px 0 #27ae60;
        }

        .action-btn.new-game {
            background-color: #3498db;
            box-shadow: 0 4px 0 #2980b9;
        }

        .result-box {
            text-align: center;
            font-size: 1.2rem;
            padding: 15px;
            margin: 10px 15px;
            border-radius: 30px;
            font-weight: bold;
            animation: popIn 0.5s;
            white-space: pre-line;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .result-box.excellent {
            background: linear-gradient(145deg, #f1c40f, #f39c12);
            color: #1e3a2f;
            box-shadow: 0 0 20px gold;
        }

        .result-box.celebration {
            background: linear-gradient(145deg, #f1c40f, #e67e22);
            color: #1e3a2f;
            animation: celebrate 1s infinite;
        }

        .result-box.bad {
            background: linear-gradient(145deg, #e74c3c, #c0392b);
            color: white;
        }

        @keyframes celebrate {
            0%, 100% { transform: scale(1); box-shadow: 0 0 20px gold; }
            50% { transform: scale(1.05); box-shadow: 0 0 40px #f1c40f; }
        }

        .sound-status {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            padding: 4px 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .sound-status.off {
            opacity: 0.5;
        }

        .footer {
            background-color: #4a6b5c;
            color: #ffefc0;
            text-align: center;
            padding: 10px;
            font-size: 1rem;
            border-top: 3px solid #f3b33d;
        }

        .correct-answer-hint {
            display: inline-block;
            background: #27ae60;
            color: white;
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 0.7rem;
            margin-right: 5px;
        }

        @media (max-width: 360px) {
            .word-item {
                padding: 6px 10px;
                min-width: 60px;
                font-size: 0.9rem;
            }
            
            .blank-space {
                min-width: 65px;
                padding: 4px 6px;
                font-size: 0.9rem;
            }
            
            .full-story {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-box">
        <div class="game-header">
            <h1>
                <span>✏️</span> أكمل الفراغات <span>📝</span>
            </h1>
            <div class="game-subtitle">قصة العمل - الصف الرابع الابتدائي</div>
        </div>

        <div class="visitor-counter">
            <span>👥 عدد الزوار</span>
            <div style="display: flex; gap: 10px; align-items: center;">
                <div class="visitor-box">
                    <span id="visitorCount">0</span>
                </div>
                <div class="sound-status" id="soundToggle">
                    <span id="soundIcon">🔊</span>
                    <span id="soundText">صوت</span>
                </div>
            </div>
        </div>

        <div class="progress-bar">
            <div class="score hidden" id="scoreBox">
                <span class="star">⭐</span> 
                <span id="scoreValue">0</span>
            </div>
            <div>
                <button class="action-btn new-game" id="newGameBtn">🔄 لعبة جديدة</button>
        </div>
            <div class="correct-count" id="correctCount">
                ✅ 0/10
            </div>

        </div>

        <div class="story-area">
            <div class="story-card">
                <div class="story-title">📖 القصة كاملة - اختر الكلمات المناسبة</div>
                
                <div class="full-story" id="fullStory">
                    <!-- النص الكامل مع الفراغات سيتم وضعه هنا -->
                </div>

                <div class="words-area">
                    <div class="words-title">👇 اضغط على الكلمة (<span id="wordsCount">10</span> كلمات متاحة)</div>
                    <div class="words-container" id="wordsContainer"></div>
                </div>

                <div class="guide-message" id="guideMessage">
                    اضغط على كلمة، ثم اضغط على الفراغ المناسب
                </div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="action-btn check" id="checkBtn">✅ تحقق من إجاباتي</button>
        </div>

        <div id="resultDisplay"></div>

        <div class="footer">
            ﴿ وَأَنْ لَيْسَ لِلْإِنْسَانِ إِلَّا مَا سَعَى ﴾
        </div>
    </div>

    <script>
        // إحصائيات الزوار
        function updateVisitorCount() {
            let visitors = localStorage.getItem('gameVisitors');
            if (!visitors) visitors = 1;
            else visitors = parseInt(visitors) + 1;
            localStorage.setItem('gameVisitors', visitors);
            document.getElementById('visitorCount').textContent = visitors;
        }

        // النص الكامل للقصة
        const fullStoryText = `جاء رجل إلى النبي محمد صلى الله عليه وسلم وقال: يا رسول الله، إني فقير فساعدني. فأعطاه النبي صلى الله عليه وسلم فأساً وقال له: اذهب واجمع الحطب وبعه، ثم ارجع إلي. حمل الرجل فأسه وذهب إلى الجبل، وأخذ يقطع الحطب ويجمعه، ثم يبيعه، فربح مالاً كثيراً، واشترى لأولاده ثياباً وطعاماً، فعرف لذة العمل. ولما عاد إلى النبي صلى الله عليه وسلم قال له: هذا خير لك من أن تقعد بلا عملٍ، وتشكو من الفقر.`;

        // متغيرات اللعبة
        let currentScore = 0;
        let filledBlanks = [];
        let selectedWordElement = null;
        let selectedWordText = "";
        let correctAnswers = [];
        let blankPositions = [];
        let blankElements = [];
        let availableWords = [];
        let audioContext = null;
        let soundEnabled = true;
        let gameChecked = false; // متغير جديد لتتبع ما إذا تم التحقق

        // عناصر الصفحة
        const fullStoryDiv = document.getElementById('fullStory');
        const wordsContainer = document.getElementById('wordsContainer');
        const guideMsg = document.getElementById('guideMessage');
        const scoreSpan = document.getElementById('scoreValue');
        const scoreBox = document.getElementById('scoreBox');
        const correctCountSpan = document.getElementById('correctCount');
        const checkBtn = document.getElementById('checkBtn');
        const newGameBtn = document.getElementById('newGameBtn');
        const resultDiv = document.getElementById('resultDisplay');
        const wordsCountSpan = document.getElementById('wordsCount');
        const soundToggle = document.getElementById('soundToggle');
        const soundIcon = document.getElementById('soundIcon');
        const soundText = document.getElementById('soundText');

        // تهيئة AudioContext
        function getAudioContext() {
            if (!audioContext) {
                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                } catch(e) {
                    console.log('Web Audio API غير مدعوم');
                }
            }
            return audioContext;
        }

        // تشغيل الصوت
        function playSound(type) {
            if (!soundEnabled) return;
            
            try {
                const ctx = getAudioContext();
                if (!ctx) return;
                
                if (ctx.state === 'suspended') {
                    ctx.resume();
                }

                const now = ctx.currentTime;
                
                if (type === 'select') {
                    for (let i = 0; i < 2; i++) {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.type = 'sine';
                        osc.frequency.value = 523.25 + (i * 131);
                        gain.gain.setValueAtTime(0.1, now + i * 0.05);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.05 + 0.1);
                        osc.start(now + i * 0.05);
                        osc.stop(now + i * 0.05 + 0.1);
                    }
                }
                else if (type === 'place') {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(392, now);
                    osc.frequency.exponentialRampToValueAtTime(523.25, now + 0.15);
                    gain.gain.setValueAtTime(0.12, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    osc.start(now);
                    osc.stop(now + 0.2);
                }
                else if (type === 'correct') {
                    const notes = [523.25, 659.25, 783.99];
                    notes.forEach((freq, i) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.type = 'sine';
                        osc.frequency.value = freq;
                        gain.gain.setValueAtTime(0.1, now + i * 0.1);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.15);
                        osc.start(now + i * 0.1);
                        osc.stop(now + i * 0.1 + 0.15);
                    });
                }
                else if (type === 'wrong') {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(261.63, now);
                    osc.frequency.exponentialRampToValueAtTime(220, now + 0.2);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                    osc.start(now);
                    osc.stop(now + 0.25);
                }
                else if (type === 'check') {
                    for (let i = 0; i < 3; i++) {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.type = 'sine';
                        osc.frequency.value = 392 + (i * 131);
                        gain.gain.setValueAtTime(0.1, now + i * 0.08);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.08 + 0.12);
                        osc.start(now + i * 0.08);
                        osc.stop(now + i * 0.08 + 0.12);
                    }
                }
                else if (type === 'excellent') {
                    const notes = [523.25, 659.25, 783.99, 1046.5];
                    notes.forEach((freq, i) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.type = 'sine';
                        osc.frequency.value = freq;
                        gain.gain.setValueAtTime(0.15, now + i * 0.12);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.12 + 0.2);
                        osc.start(now + i * 0.12);
                        osc.stop(now + i * 0.12 + 0.2);
                    });
                }
                else if (type === 'bad') {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(329.63, now);
                    osc.frequency.exponentialRampToValueAtTime(261.63, now + 0.4);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.45);
                    osc.start(now);
                    osc.stop(now + 0.45);
                }
                else if (type === 'newgame') {
                    const notes = [392, 523.25, 659.25];
                    notes.forEach((freq, i) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.type = 'sine';
                        osc.frequency.value = freq;
                        gain.gain.setValueAtTime(0.1, now + i * 0.08);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.08 + 0.1);
                        osc.start(now + i * 0.08);
                        osc.stop(now + i * 0.08 + 0.1);
                    });
                }
            } catch(e) {
                console.log('خطأ في تشغيل الصوت');
            }
        }

        // تشغيل/إيقاف الصوت
        function toggleSound() {
            soundEnabled = !soundEnabled;
            if (soundEnabled) {
                soundIcon.textContent = '🔊';
                soundText.textContent = 'صوت';
                soundToggle.classList.remove('off');
                playSound('select');
            } else {
                soundIcon.textContent = '🔇';
                soundText.textContent = 'كتم';
                soundToggle.classList.add('off');
            }
        }

        // تنظيف الكلمة من علامات الترقيم
        function cleanWord(word) {
            return word.replace(/[،,.;:!؟]/g, '').trim();
        }

        // توليد 10 مواقع عشوائية مختلفة في النص
        function generateRandomPositions(text) {
            const words = text.split(' ');
            const positions = [];
            const maxAttempts = 1000;
            let attempts = 0;
            
            while (positions.length < 10 && attempts < maxAttempts) {
                const pos = Math.floor(Math.random() * words.length);
                const word = words[pos];
                const cleanedWord = cleanWord(word);
                
                if (cleanedWord && cleanedWord.length > 1 && !positions.includes(pos)) {
                    positions.push(pos);
                }
                
                attempts++;
            }
            
            while (positions.length < 10) {
                const pos = Math.floor(Math.random() * words.length);
                if (!positions.includes(pos)) {
                    positions.push(pos);
                }
            }
            
            return positions.sort((a, b) => a - b);
        }

        // استخراج الكلمات من المواقع المختارة
        function extractWordsFromPositions(positions, text) {
            const words = text.split(' ');
            const extractedWords = [];
            
            for (let pos of positions) {
                let word = words[pos];
                let cleanedWord = cleanWord(word);
                extractedWords.push(cleanedWord);
            }
            
            return extractedWords;
        }

        // بناء القصة مع الفراغات
        function buildStoryWithBlanks() {
            const words = fullStoryText.split(' ');
            
            blankPositions = generateRandomPositions(fullStoryText);
            correctAnswers = extractWordsFromPositions(blankPositions, fullStoryText);
            
            let result = '';
            let blankIndex = 0;
            
            for (let i = 0; i < words.length; i++) {
                if (blankPositions.includes(i)) {
                    result += `<span class="blank-space waiting" data-index="${blankIndex}"></span> `;
                    blankIndex++;
                } else {
                    result += words[i] + ' ';
                }
            }
            
            fullStoryDiv.innerHTML = result;
            
            blankElements = document.querySelectorAll('.blank-space');
            filledBlanks = new Array(10).fill(false);
            
            blankElements.forEach(blank => {
                blank.onclick = () => fillBlank(blank);
            });
            
            availableWords = [...correctAnswers];
            availableWords.sort(() => Math.random() - 0.5);
        }

        // عرض الكلمات المتاحة
        function displayAvailableWords() {
            wordsContainer.innerHTML = '';
            
            availableWords.forEach((word, index) => {
                const wordSpan = document.createElement('span');
                wordSpan.className = 'word-item';
                wordSpan.textContent = word;
                wordSpan.dataset.index = index;
                wordSpan.onclick = () => selectWord(wordSpan);
                wordsContainer.appendChild(wordSpan);
            });
            
            wordsCountSpan.textContent = availableWords.length;
        }

        // اختيار كلمة
        function selectWord(element) {
            if (element.classList.contains('used')) {
                guideMsg.textContent = '❌ هذه الكلمة مستخدمة بالفعل';
                return;
            }
            
            playSound('select');
            
            if (selectedWordElement) {
                selectedWordElement.classList.remove('selected');
            }
            
            selectedWordElement = element;
            selectedWordText = element.textContent;
            element.classList.add('selected');
            
            guideMsg.textContent = `👈 الآن اضغط على الفراغ المناسب لكلمة "${selectedWordText}"`;
        }

        // ملء الفراغ
        function fillBlank(blankElement) {
            if (!selectedWordElement) {
                guideMsg.textContent = '👆 اختر كلمة أولاً';
                return;
            }
            
            const index = parseInt(blankElement.dataset.index);
            
            if (filledBlanks[index]) {
                guideMsg.textContent = '⚠️ هذا الفراغ مملوء بالفعل';
                return;
            }
            
            playSound('place');
            
            blankElement.textContent = selectedWordText;
            blankElement.classList.remove('waiting');
            blankElement.classList.add('filled');
            
            selectedWordElement.classList.remove('selected');
            selectedWordElement.classList.add('used');
            
            filledBlanks[index] = true;
            
            guideMsg.textContent = `✅ تم وضع "${selectedWordText}" في الفراغ`;
            
            selectedWordElement = null;
            
            const usedWords = document.querySelectorAll('.word-item.used').length;
            const remainingWords = availableWords.length - usedWords;
            wordsCountSpan.textContent = remainingWords;
            
            if (usedWords === availableWords.length) {
                guideMsg.textContent = '🎉 أحسنت! استخدمت جميع الكلمات. اضغط على "تحقق من إجاباتي"';
            }
        }

        // دالة عرض الإجابة الصحيحة في الفراغ الخاطئ
        function showCorrectAnswer(blankElement, correctAnswer) {
            // حفظ الإجابة الخاطئة مؤقتاً
            const wrongAnswer = blankElement.textContent;
            
            // تغيير لون الخلفية ومحتوى الفراغ
            blankElement.classList.remove('filled', 'correct', 'wrong');
            blankElement.classList.add('show-correct');
            blankElement.innerHTML = `${correctAnswer} <span class="correct-answer-hint">✓</span>`;
            
            // إعادة الكلمة الخاطئة إلى الكلمات المتاحة إذا كانت مستخدمة
            if (wrongAnswer) {
                const wordElements = document.querySelectorAll('.word-item');
                for (let word of wordElements) {
                    if (word.textContent === wrongAnswer && word.classList.contains('used')) {
                        word.classList.remove('used');
                        word.style.opacity = '1';
                        word.style.pointerEvents = 'auto';
                        break;
                    }
                }
            }
            
            // تحديث عدد الكلمات المتاحة
            const usedWords = document.querySelectorAll('.word-item.used').length;
            wordsCountSpan.textContent = availableWords.length - usedWords;
        }

        // التحقق من الإجابات مع عرض الإجابات الصحيحة
        function checkAllAnswers() {
            playSound('check');
            
            let correctCount = 0;
            
            blankElements.forEach((blank, index) => {
                const userAnswer = blank.textContent;
                const correctAnswer = correctAnswers[index];
                
                // إزالة أي كلاسات سابقة
                blank.classList.remove('filled', 'correct', 'wrong', 'show-correct');
                
                if (userAnswer === correctAnswer) {
                    // إجابة صحيحة
                    blank.classList.add('correct');
                    blank.textContent = correctAnswer;
                    correctCount++;
                } else {
                    // إجابة خاطئة أو فراغ فارغ - نعرض الإجابة الصحيحة
                    playSound('wrong');
                    showCorrectAnswer(blank, correctAnswer);
                }
            });
            
            // تحديث النتيجة وعرض صندوق النتيجة
            gameChecked = true;
            currentScore = correctCount * 5;
            scoreSpan.textContent = currentScore;
            scoreBox.classList.remove('hidden');
            
            if (correctCount === 10) {
                playSound('excellent');
            } else if (correctCount < 5) {
                playSound('bad');
            }
            
            correctCountSpan.textContent = `✅ ${correctCount}/10`;
            
            // عرض رسالة النتيجة
            let message = '';
            let messageClass = '';
            
            if (correctCount === 10) {
                message = '🎉🎊 مبروك! إجابة مثالية! 🎊🎉\nأجبت على جميع الأسئلة بشكل صحيح! أنت بطل القصة!';
                messageClass = 'celebration';
                guideMsg.textContent = '🏆 أحسنت! إجابة مثالية!';
            } else if (correctCount > 5) {
                message = `🌟 أحسنت! لديك ${correctCount} إجابات صحيحة من 10.\nالفراغات الحمراء تظهر الإجابة الصحيحة!`;
                messageClass = 'excellent';
                guideMsg.textContent = '👍 أداء ممتاز! انظر للإجابات الصحيحة';
            } else {
                message = `📝 لديك ${correctCount} إجابات صحيحة من 10.\nالفراغات الحمراء تظهر الإجابة الصحيحة - حاول مرة أخرى!`;
                messageClass = 'bad';
                guideMsg.textContent = '💪 لا تستسلم! الإجابات الصحيحة ظاهرة باللون الأحمر';
            }
            
            resultDiv.innerHTML = `<div class="result-box ${messageClass}">${message}</div>`;
            
            // منع المزيد من التفاعل مع الفراغات بعد التحقق
            blankElements.forEach(blank => {
                blank.onclick = null;
                blank.style.cursor = 'default';
            });
        }

        // لعبة جديدة
        function newGame() {
            playSound('newgame');
            
            buildStoryWithBlanks();
            displayAvailableWords();
            
            currentScore = 0;
            selectedWordElement = null;
            gameChecked = false;
            
            // إخفاء صندوق النتيجة
            scoreSpan.textContent = '0';
            scoreBox.classList.add('hidden');
            correctCountSpan.textContent = '✅ 0/10';
            resultDiv.innerHTML = '';
            guideMsg.innerHTML = 'اضغط على كلمة، ثم اضغط على الفراغ المناسب';
        }

        document.addEventListener('contextmenu', (e) => e.preventDefault());

        function startGame() {
            updateVisitorCount();
            newGame();
            
            checkBtn.onclick = checkAllAnswers;
            newGameBtn.onclick = newGame;
            soundToggle.onclick = toggleSound;
        }

        startGame();
    </script>
</body>
</html>
